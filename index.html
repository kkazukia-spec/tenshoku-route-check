<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30秒転職ルート診断｜れんの20代転職の道案内</title>
  <meta name="description" content="7つの質問から、今の状況に合う転職ルートを整理。第二新卒、未経験、IT、営業、キャリアアップなど、次に検討しやすい選択肢を30秒で確認できます。">

  <!-- OGP -->
  <meta property="og:title" content="30秒転職ルート診断">
  <meta property="og:description" content="今の状況を整理して、自分に合う次の一歩を見つける転職ルート診断。20代〜30代前半向け・全7問・無料。">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://kkazukia-spec.github.io/tenshoku-route-check/assets/images/ogp.png">
  <!-- canonical: 公開URL決定後に以下を書き換えてください -->
  <!-- <link rel="canonical" href="https://kkazukia-spec.github.io/tenshoku-route-check/"> -->

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="30秒転職ルート診断">
  <meta name="twitter:description" content="「辞めたい。でも次が分からない」20代〜30代前半へ。7問で今の転職ルートを整理します。">
  <meta name="twitter:image" content="https://kkazukia-spec.github.io/tenshoku-route-check/assets/images/ogp.png">

  <link rel="icon" href="assets/images/favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">

  <!-- アクセス解析（ANALYTICS_CONFIG.enabledがtrueの場合のみ動作） -->
  <script src="assets/js/analytics.js" defer></script>
  <meta property="og:url" content="https://kkazukia-spec.github.io/tenshoku-route-check/">
  <meta property="og:site_name" content="30秒転職ルート診断">
</head>
<body>
  <main id="diagnosis-app" role="main">

    <!-- =========================================
         スタート画面
         広告リンクを表示しない
         ========================================= -->
    <div id="screen-start" class="screen" aria-label="診断スタート画面">
      <span class="start__badge">20代〜30代前半向け・無料</span>

      <h1 class="start__title">30秒転職ルート診断</h1>

      <p class="start__catch">今の状況を整理して、
次に検討しやすい転職ルートを見つけよう。</p>

      <ul class="start__meta" aria-label="診断の特徴">
        <li class="start__meta-item">全7問</li>
        <li class="start__meta-item">診断では個人情報の入力なし</li>
        <li class="start__meta-item">回答は外部送信しません</li>
      </ul>

      <!-- キャラクター画像（画像がなくてもレイアウト崩れなし） -->
      <div class="start__character" role="img" aria-label="地図を持って転職ルートを案内するキャラクター・れん">
        <img
          src="assets/images/ren-guide.png"
          alt="地図を持って転職ルートを案内するキャラクター・れん"
          width="140"
          height="140"
          loading="eager"
          onerror="this.style.display='none'"
        >
      </div>

      <button
        id="btn-start"
        class="start__btn"
        type="button"
        aria-label="転職ルート診断を無料で始める"
      >
        無料で診断を始める
      </button>

      <p class="start__note">
        診断結果は選択肢の一例です。<br>
        転職やサービス利用を強制するものではありません。
      </p>
    </div>

    <!-- =========================================
         質問画面
         広告・PR表記・案件名を表示しない
         ========================================= -->
    <div id="screen-question" class="screen" style="display:none;" aria-label="質問画面">
      <!-- プログレスバー -->
      <div class="progress-bar" role="progressbar" aria-label="診断の進捗" aria-valuemin="0" aria-valuemax="7" aria-valuenow="0" aria-valuetext="0問目 / 全7問">
        <div class="progress-bar__fill" id="progress-fill" style="width:0%"></div>
      </div>

      <div class="progress-header">
        <span class="progress-count" id="progress-count" aria-live="polite">1 / 7問</span>
        <span class="progress-time" id="progress-time" aria-live="polite">残り約28秒</span>
      </div>

      <!-- 質問カード（JavaScriptで動的に生成） -->
      <div id="question-container"></div>
    </div>

    <!-- =========================================
         判定中画面（300〜600ms表示）
         不安を煽る演出なし
         ========================================= -->
    <div id="screen-loading" class="screen" style="display:none;" aria-label="判定中" aria-live="assertive">
      <div class="loading-icon" aria-hidden="true"></div>
      <p class="loading-text">回答をもとに転職ルートを整理しています</p>
    </div>

  </main>

  <!-- フッター -->
  <footer class="site-footer">
    <div class="container">
      <nav class="site-footer__links" aria-label="サイトリンク">
        <a href="about.html">運営者情報</a>
        <a href="privacy.html">プライバシーポリシー</a>
        <a href="disclaimer.html">免責事項</a>
        <a href="advertising-policy.html">広告掲載方針</a>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSc9FiE9QrxssRtH7XwaJatHyO9ElNKXP9jEjue935tfSrN-sg/viewform" target="_blank" rel="noopener noreferrer">お問い合わせ</a>
      </nav>
      <p class="site-footer__copy">© れん｜20代転職の道案内</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
